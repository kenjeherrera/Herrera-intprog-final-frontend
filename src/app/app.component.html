<div class="app-container" [ngClass]="{ 'bg-light': account }">
  <!-- main nav -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark px-3" *ngIf="account">
    <div class="container-fluid">
      <a class="navbar-brand" routerLink="/">Angular App</a>
      <button
        class="navbar-toggler"
        type="button"
        data-bs-toggle="collapse"
        data-bs-target="#navbarNav"
        aria-controls="navbarNav"
        aria-expanded="false"
        aria-label="Toggle navigation"
      >
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <div class="navbar-nav ms-auto">
          <a
            routerLink="/"
            routerLinkActive="active"
            [routerLinkActiveOptions]="{ exact: true }"
            class="nav-item nav-link"
            >Home</a
          >
          <a routerLink="/profile" routerLinkActive="active" class="nav-item nav-link">Profile</a>
          <a
            *ngIf="account.role === Role.Admin"
            routerLink="/admin"
            routerLinkActive="active"
            class="nav-item nav-link"
            >Admin</a
          >
          <button (click)="logout()" class="btn btn-link nav-item nav-link">Logout</button>
        </div>
      </div>
    </div>
  </nav>

  <!-- subnav router outlet -->
  <router-outlet name="subnav"></router-outlet>

  <!-- global alert -->
  <alert></alert>

  <!-- main router outlet -->
  <router-outlet></router-outlet>
</div>
