<div class="py-5">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-8 col-xl-6">
        <h1 class="mb-4 text-center">My Profile</h1>
        <div class="card border-0" *ngIf="account">
          <div class="card-body">
            <div class="row mb-4">
              <div class="col-md-6">
                <h6 class="text-muted text-uppercase small mb-2">Full Name</h6>
                <p class="h5">{{ account.title }} {{ account.firstName }} {{ account.lastName }}</p>
              </div>
              <div class="col-md-6">
                <h6 class="text-muted text-uppercase small mb-2">Email</h6>
                <p class="h5">{{ account.email }}</p>
              </div>
            </div>
            <hr class="my-4" />
            <div class="d-flex gap-2 justify-content-center">
              <a routerLink="update" class="btn btn-primary">
                <i class="bi bi-pencil"></i> Edit Profile
              </a>
              <a routerLink="/" class="btn btn-outline-secondary">
                <i class="bi bi-house"></i> Back to Home
              </a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
