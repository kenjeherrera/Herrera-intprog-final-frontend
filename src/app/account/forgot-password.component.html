<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-5 col-lg-4">
      <div class="card border-0">
        <h4 class="card-header text-center">Forgot Password</h4>
        <div class="card-body">
          <p class="text-muted mb-4 text-center">
            Enter your email to receive a password reset link.
          </p>
          <form [formGroup]="form" (ngSubmit)="onSubmit()">
            <div class="mb-3">
              <label class="form-label">Email</label>
              <input
                type="text"
                formControlName="email"
                class="form-control"
                placeholder="Enter your email"
                [ngClass]="{ 'is-invalid': submitted && f['email'].errors }"
              />
              <div *ngIf="submitted && f['email'].errors" class="invalid-feedback d-block">
                <small *ngIf="f['email'].errors['required']">Email is required</small>
                <small *ngIf="f['email'].errors['email']"
                  >Email must be a valid email address</small
                >
              </div>
            </div>
            <div class="d-grid gap-2 mb-3">
              <button [disabled]="loading" class="btn btn-primary btn-lg">
                <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
                <span *ngIf="!loading">Submit</span>
                <span *ngIf="loading">Submitting...</span>
              </button>
            </div>
            <div class="text-center">
              <a routerLink="../login" class="btn btn-link btn-sm">Back to Login</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
