<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-5 col-lg-4">
      <div class="card border-0">
        <h4 class="card-header text-center">Reset Password</h4>
        <div class="card-body">
          <div *ngIf="tokenStatus == TokenStatus.Validating" class="text-center py-5">
            <span class="spinner-border spinner-border-lg align-center"></span>
            <p class="text-muted mt-3">Validating token...</p>
          </div>
          <div *ngIf="tokenStatus == TokenStatus.Invalid" class="alert alert-danger">
            <strong>Token Validation Failed</strong><br />
            If the token is expired, you can get a new one at the
            <a routerLink="/account/forgot-password">forgot password</a> page.
          </div>
          <form *ngIf="tokenStatus == TokenStatus.Valid" [formGroup]="form" (ngSubmit)="onSubmit()">
            <div class="mb-3">
              <label class="form-label">New Password</label>
              <input
                type="password"
                formControlName="password"
                class="form-control"
                placeholder="Enter new password"
                [ngClass]="{ 'is-invalid': submitted && f['password'].errors }"
              />
              <div *ngIf="submitted && f['password'].errors" class="invalid-feedback d-block">
                <small *ngIf="f['password'].errors['required']">Password is required</small>
                <small *ngIf="f['password'].errors['minlength']"
                  >Password must be at least 6 characters</small
                >
              </div>
            </div>
            <div class="mb-4">
              <label class="form-label">Confirm Password</label>
              <input
                type="password"
                formControlName="confirmPassword"
                class="form-control"
                placeholder="Confirm password"
                [ngClass]="{ 'is-invalid': submitted && f['confirmPassword'].errors }"
              />
              <div
                *ngIf="submitted && f['confirmPassword'].errors"
                class="invalid-feedback d-block"
              >
                <small *ngIf="f['confirmPassword'].errors['required']"
                  >Confirm Password is required</small
                >
                <small *ngIf="f['confirmPassword'].errors['mustMatch']">Passwords must match</small>
              </div>
            </div>
            <div class="d-grid gap-2 mb-3">
              <button [disabled]="loading" class="btn btn-primary btn-lg">
                <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
                <span *ngIf="!loading">Reset Password</span>
                <span *ngIf="loading">Resetting...</span>
              </button>
            </div>
            <div class="text-center">
              <a routerLink="../login" class="btn btn-link btn-sm">Back to Login</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
